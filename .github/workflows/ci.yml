name: CI

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Login DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build image
      run: docker build -t nvtai24/gitops-demo:${{ github.sha }} .

    - name: Push image
      run: docker push nvtai24/gitops-demo:${{ github.sha }}

    - name: Checkout manifest repository
      uses: actions/checkout@v3
      with:
        repository: nvtai24/gitops-demo-manifest
        token: ${{ secrets.GH_TOKEN }}
        path: gitops-demo-manifest

    - name: Update manifest
      run: |
        set -euo pipefail
        cd gitops-demo-manifest
        sed -i "s|image: .*|image: nvtai24/gitops-demo:${{ github.sha }}|" deployment.yaml

        git config user.email "ci@github.com"
        git config user.name "github-actions"

        if ! git diff --quiet; then
          git add deployment.yaml
          git commit -m "update image to nvtai24/gitops-demo:${{ github.sha }}"
          git push
        else
          echo "No manifest changes detected; skipping commit and push."
        fi